<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Buddy - Уведомления</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i>
                <span>Plant Buddy</span>
            </div>
            <button class="btn-add-plant">
                <i class="fa-solid fa-circle-plus"></i>
                <span>Добавить новое растение</span>
            </button>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Задачи</span>
                </a>
                <a href="my_plants.html" class="nav-item">
                    <i class="fa-solid fa-seedling"></i>
                    <span>Мои растения</span>
                </a>
                <a href="library.html" class="nav-item">
                    <i class="fa-solid fa-book"></i>
                    <span>Справочник</span>
                </a>
                <a href="notifications.html" class="nav-item active">
                    <i class="fa-solid fa-bell"></i>
                    <span>Уведомления</span>
                </a>
            </nav>
        </div>
        <button class="btn-settings">
            <i class="fa-solid fa-gear"></i>
            <span>Настройки</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <h1 class="page-title">Уведомления</h1>
                <p class="page-subtitle">История напоминаний и важные сообщения</p>
            </div>
        </header>

        <section class="section-notifications" style="padding: 20px 0;">
            <p style="color: #64748b;">У вас нет новых уведомлений. Все растения ухожены! 👍</p>
        </section>
    </main>
    <script src="js/notifications.js"></script>
</body>
</html>
