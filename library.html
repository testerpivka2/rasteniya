<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Buddy - Справочник</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i>
                <span>Plant Buddy</span>
            </div>

            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Задачи</span>
                </a>
                <a href="my_plants.html" class="nav-item">
                    <i class="fa-solid fa-seedling"></i>
                    <span>Мои растения</span>
                </a>
                <a href="library.html" class="nav-item active">
                    <i class="fa-solid fa-book"></i>
                    <span>Справочник</span>
                </a>
                <a href="notifications.html" class="nav-item">
                    <i class="fa-solid fa-bell"></i>
                    <span>Уведомления</span>
                </a>
            </nav>
        </div>

    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <h1 class="page-title">Справочник растений</h1>
                <p class="page-subtitle">Изучайте и открывайте новые виды растений</p>
            </div>
            <div class="header-right">
                <a href="notifications.html" class="btn-notification">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notification-dot"></span>
                </a>
            </div>
        </header>

        <section class="section-plants">
            <div class="section-controls">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" placeholder="Поиск растений..." class="search-input" id="search-input">
                </div>
            </div>

            <div class="category-filters" id="category-filters">
                <button class="filter-btn active" data-category="all">Все</button>
                <button class="filter-btn" data-category="flowers">🌸 Цветущие</button>
                <button class="filter-btn" data-category="succulents">🌵 Суккуленты</button>
                <button class="filter-btn" data-category="trees">🌳 Деревья</button>
                <button class="filter-btn" data-category="herbs">🌿 Травы</button>
                <button class="filter-btn" data-category="palms">🌴 Пальмы</button>
            </div>

            <div class="plants-grid" id="plants-grid"></div>

            <div class="no-results" id="no-results" style="display: none;">
                <i class="fa-solid fa-search" style="font-size: 48px; color: #cbd5e1;"></i>
                <h3>Ничего не найдено</h3>
                <p>Попробуйте изменить критерии поиска</p>
            </div>
        </section>
    </main>

    <script src="js/scripts.js"></script>
</body>
</html>
