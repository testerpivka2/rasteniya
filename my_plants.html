<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Buddy - Мои растения</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="logo">
                <i class="fa-solid fa-leaf"></i>
                <span>Plant Buddy</span>
            </div>
            <button class="btn-add-plant">
                <i class="fa-solid fa-circle-plus"></i>
                <span>Добавить новое растение</span>
            </button>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Задачи</span>
                </a>
                <a href="my_plants.html" class="nav-item active">
                    <i class="fa-solid fa-seedling"></i> 
                    <span>Мои растения</span>
                </a>
                <a href="library.html" class="nav-item">
                    <i class="fa-solid fa-book"></i>
                    <span>Справочник</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-bell"></i>
                    <span>Уведомления</span>
                </a>
            </nav>
        </div>
        <button class="btn-settings">
            <i class="fa-solid fa-gear"></i>
            <span>Настройки</span>
        </button>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <h1 class="page-title">Мои растения</h1>
                <p class="page-subtitle">Управление вашей зеленой коллекцией</p>
            </div>
            <div class="header-right">
                <button class="btn-notification">
                    <i class="fa-solid fa-bell"></i>
                    <span class="notification-dot"></span>
                </button>
            </div>
        </header>

        <section class="section-plants">
            <div class="empty-state" id="empty-state">
                <p class="none-list-plants">Здесь пока пусто...</p>
                <p class="none-list-plants">Добавьте свои растения из справочника!</p>
            </div>
            <div class="plants-grid" id="myPlantsGrid"></div>
        </section>
    </main>

    <script src="js/scripts.js"></script>
</body>
</html>
